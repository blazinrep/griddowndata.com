<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — GridDownData</title>
<meta name="description" content="Thank you for ordering the Grid-Down Survival Data Kit.">
<link rel="canonical" href="https://www.griddowndata.com/thank-you.html">
<meta name="robots" content="noindex">
<style>
  :root{
    --charcoal:#1A1F1B;
    --charcoal-2:#232A24;
    --orange:#D35400;
    --text:#E7E9E5;
    --muted:#A9B0A6;
    --line:#3A443B;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--charcoal);color:var(--text);
    font-family:"Helvetica Neue",Arial,sans-serif;line-height:1.6;
    display:flex;align-items:center;justify-content:center;min-height:100vh;
    padding:24px;
  }
  .card{
    max-width:620px;background:var(--charcoal-2);border:1px solid var(--line);
    border-radius:6px;padding:48px;text-align:center;
  }
  .brand{
    font-weight:800;letter-spacing:.14em;text-transform:uppercase;font-size:1.05rem;margin-bottom:28px;
  }
  .brand span{color:var(--orange)}
  h1{font-size:clamp(1.8rem,5vw,2.6rem);margin-bottom:16px}
  .hl{color:var(--orange)}
  p{color:var(--muted);font-size:1.05rem;margin:14px 0}
  .order{
    display:inline-block;background:var(--charcoal);border:1px solid var(--line);border-radius:4px;
    padding:10px 16px;margin-top:18px;font-family:monospace;color:var(--text);font-size:.95rem;
  }
  a.cta{
    display:inline-block;margin-top:30px;background:var(--orange);color:#fff;text-decoration:none;
    font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:14px 28px;border-radius:3px;
  }
</style>
</head>
<body>
  <main class="card">
    <div class="brand-header" style="display: flex; align-items: center; gap: 18px; padding: 10px 0; margin-bottom: 28px; justify-content: center;">
      <!-- Floating High-Fidelity Woodcut Emblem (No Shield) -->
      <svg width="80" height="60" viewBox="0 0 100 75" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Dark Mountain Silhouettes for Depth -->
        <path d="M5 68 L32 25 L55 52 L75 32 L95 68 Z" fill="#0F1214"/>
        <!-- Radio Tower Core Structure -->
        <path d="M50 3 L43 68 L57 68 Z" stroke="#E65100" stroke-width="2.5" fill="#0F1214"/>
        <path d="M48 18 L52 18 M46 34 L54 34 M45 50 L55 50 M48 18 L53 34 M52 18 L47 34 M47 34 L54 50 M53 34 L46 50 M46 50 L57 68 M54 50 L43 68" stroke="#E65100" stroke-width="1"/>
        <!-- Signal Energy Waves -->
        <path d="M44 10 Q50 1 56 10" stroke="#FF5C1F" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="1 1"/>
        <path d="M40 14 Q50 -2 60 14" stroke="#FF5C1F" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
        <!-- Crisp White Mountain Outer Ridges -->
        <path d="M5 68 L32 25 L55 52 L75 32 L95 68" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Precision Woodcut Shading Facets (Orange Accents) -->
        <path d="M32 25 L41 46 L45 68 M32 25 L24 45 M75 32 L66 50 L61 68 M75 32 L83 48" stroke="#FF5C1F" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <!-- Brand Typography -->
      <div class="brand-text" style="display: flex; flex-direction: column; text-align: left;">
        <h1 style="font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 900; font-size: 24px; color: #FFFFFF; margin: 0; line-height: 1.0; letter-spacing: 1.5px; text-transform: uppercase; border: none; padding: 0;">GRID DOWN</h1>
        <span style="font-family: monospace; font-size: 10px; color: #E65100; letter-spacing: 2.5px; font-weight: bold; text-transform: uppercase; margin-top: 3px;">DATA BLUEPRINT</span>
      </div>
    </div>
    <h1>Thank you. <span class="hl">Your kit is coming.</span></h1>
    <p>We received your order and are processing payment confirmation now. You’ll get an email receipt from Stripe, and we’ll ship your Grid-Down Survival Data Kit within 1–2 business days.</p>
    <p>Order reference:</p>
    <div class="order" id="orderRef">—</div>
    <div>
      <a class="cta" href="/">Back to GridDownData</a>
    </div>
  </main>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');
      if (sessionId) {
        document.getElementById('orderRef').textContent = sessionId;
      }
    })();
  </script>
</body>
</html>
